name: Daily Blue Chip Screener

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: blue-chip-screener

      - name: Run screener
        run: python main.py
        working-directory: blue-chip-screener

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blue-chip-screener/reports/ docs/
          git diff --staged --quiet || git commit -m "Daily screener update [$(date +%F)]"
          git push
